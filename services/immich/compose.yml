services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    container_name: ${IMMICH_SERVER_CONTAINER_NAME}
    depends_on:
      - immich-postgres
    networks:
      - shared-net
    volumes:
      - ./data/library:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: ${IMMICH_TIMEZONE}
      DB_HOSTNAME: ${IMMICH_DB_HOST}
      DB_PORT: ${IMMICH_DB_PORT}
      DB_USERNAME: ${IMMICH_DB_USERNAME}
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_DATABASE_NAME: ${IMMICH_DB_NAME}
      REDIS_HOSTNAME: ${IMMICH_REDIS_HOST}
      REDIS_PORT: ${IMMICH_REDIS_PORT}
    restart: unless-stopped

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}
    container_name: ${IMMICH_MACHINE_LEARNING_CONTAINER_NAME}
    networks:
      - shared-net
    volumes:
      - immich_model_cache:/cache
    environment:
      TZ: ${IMMICH_TIMEZONE}
    restart: unless-stopped

  immich-postgres:
    image: ghcr.io/immich-app/postgres:${IMMICH_POSTGRES_VERSION}
    container_name: ${IMMICH_POSTGRES_CONTAINER_NAME}
    networks:
      - shared-net
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      DB_STORAGE_TYPE: ${IMMICH_DB_STORAGE_TYPE}
    shm_size: 128mb
    restart: unless-stopped

networks:
  shared-net:
    external: true

volumes:
  immich_model_cache:
