services:
  homepage:
    image: ghcr.io/gethomepage/homepage:${HOMEPAGE_VERSION}
    container_name: ${HOMEPAGE_CONTAINER_NAME}
    networks:
      - shared-net
    volumes:
      - ./config:/app/config
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_SUBDOMAIN:-home}.${STACK_DOMAIN:-localhost}
      HOMEPAGE_VAR_STACK_DOMAIN: ${STACK_DOMAIN:-localhost}
      HOMEPAGE_VAR_WORDPRESS_SUBDOMAIN: ${WORDPRESS_SUBDOMAIN:-blog}
      HOMEPAGE_VAR_N8N_SUBDOMAIN: ${N8N_SUBDOMAIN:-n8n}
      HOMEPAGE_VAR_UPTIME_KUMA_SUBDOMAIN: ${UPTIME_KUMA_SUBDOMAIN:-uptime}
      HOMEPAGE_VAR_HOMEPAGE_SUBDOMAIN: ${HOMEPAGE_SUBDOMAIN:-home}
      HOMEPAGE_VAR_NEXTCLOUD_SUBDOMAIN: ${NEXTCLOUD_SUBDOMAIN:-cloud}
      HOMEPAGE_VAR_IMMICH_SUBDOMAIN: ${IMMICH_SUBDOMAIN:-photos}
      HOMEPAGE_VAR_JELLYFIN_SUBDOMAIN: ${JELLYFIN_SUBDOMAIN:-media}
      HOMEPAGE_VAR_MASTODON_SUBDOMAIN: ${MASTODON_SUBDOMAIN:-social}
    restart: unless-stopped

networks:
  shared-net:
    external: true
