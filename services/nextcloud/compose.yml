services:
  nextcloud-db-init:
    image: mariadb:${MARIADB_CLIENT_VERSION}
    networks:
      - shared-net
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      NEXTCLOUD_DB_NAME: ${NEXTCLOUD_DB_NAME}
      NEXTCLOUD_DB_USER: ${NEXTCLOUD_DB_USER}
      NEXTCLOUD_DB_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    command: >
      sh -c '
        until mariadb-admin ping -h mariadb -u root -p"$${MARIADB_ROOT_PASSWORD}" --silent; do
          echo "Waiting for MariaDB...";
          sleep 2;
        done;
        mariadb -h mariadb -u root -p"$${MARIADB_ROOT_PASSWORD}" -e "
          CREATE DATABASE IF NOT EXISTS \`$${NEXTCLOUD_DB_NAME}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS '\''$${NEXTCLOUD_DB_USER}'\''@'\''%'\'' IDENTIFIED BY '\''$${NEXTCLOUD_DB_PASSWORD}'\'';
          GRANT ALL PRIVILEGES ON \`$${NEXTCLOUD_DB_NAME}\`.* TO '\''$${NEXTCLOUD_DB_USER}'\''@'\''%'\'';
          FLUSH PRIVILEGES;
        ";
      '
    restart: "no"

  nextcloud:
    image: nextcloud:${NEXTCLOUD_VERSION}
    container_name: ${NEXTCLOUD_CONTAINER_NAME}
    depends_on:
      nextcloud-db-init:
        condition: service_completed_successfully
    networks:
      - shared-net
    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:/var/www/html/data
    environment:
      MYSQL_HOST: ${NEXTCLOUD_DB_HOST}
      MYSQL_DATABASE: ${NEXTCLOUD_DB_NAME}
      MYSQL_USER: ${NEXTCLOUD_DB_USER}
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      REDIS_HOST: ${NEXTCLOUD_REDIS_HOST}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_SUBDOMAIN:-cloud}.${STACK_DOMAIN:-localhost}
      TRUSTED_PROXIES: caddy
      APACHE_DISABLE_REWRITE_IP: "1"
      OVERWRITEHOST: ${NEXTCLOUD_SUBDOMAIN:-cloud}.${STACK_DOMAIN:-localhost}
      OVERWRITEPROTOCOL: https
      OVERWRITECLIURL: https://${NEXTCLOUD_SUBDOMAIN:-cloud}.${STACK_DOMAIN:-localhost}
      PHP_MEMORY_LIMIT: ${NEXTCLOUD_PHP_MEMORY_LIMIT}
      PHP_UPLOAD_LIMIT: ${NEXTCLOUD_PHP_UPLOAD_LIMIT}
      APACHE_BODY_LIMIT: ${NEXTCLOUD_APACHE_BODY_LIMIT}
    restart: unless-stopped

  nextcloud-cron:
    image: nextcloud:${NEXTCLOUD_VERSION}
    depends_on:
      - nextcloud
    networks:
      - shared-net
    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:/var/www/html/data
    entrypoint: /cron.sh
    restart: unless-stopped

networks:
  shared-net:
    external: true

volumes:
  nextcloud_html:
  nextcloud_data:
