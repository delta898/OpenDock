services:
  caddy:
    image: caddy:${CADDY_VERSION}
    container_name: caddy
    env_file:
      - .env
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
      - "${HTTPS_PORT}:443/udp"
    networks:
      - shared-net
    volumes:
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

networks:
  shared-net:
    external: true

volumes:
  caddy_data:
  caddy_config:
