services:
  caddy:
    image: caddy:${CADDY_VERSION}
    container_name: caddy
    env_file:
      - .env
    environment:
      STACK_DOMAIN: ${STACK_DOMAIN:-localhost}
      WORDPRESS_SUBDOMAIN: ${WORDPRESS_SUBDOMAIN:-blog}
      N8N_SUBDOMAIN: ${N8N_SUBDOMAIN:-n8n}
      UPTIME_KUMA_SUBDOMAIN: ${UPTIME_KUMA_SUBDOMAIN:-uptime}
      HOMEPAGE_SUBDOMAIN: ${HOMEPAGE_SUBDOMAIN:-home}
      NEXTCLOUD_SUBDOMAIN: ${NEXTCLOUD_SUBDOMAIN:-cloud}
      IMMICH_SUBDOMAIN: ${IMMICH_SUBDOMAIN:-photos}
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
      - "${HTTPS_PORT}:443/udp"
    networks:
      - shared-net
    volumes:
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

networks:
  shared-net:
    external: true

volumes:
  caddy_data:
  caddy_config:
